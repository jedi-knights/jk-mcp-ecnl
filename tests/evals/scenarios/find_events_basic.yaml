name: find_events_basic
description: |
  User asks "What ECNL Girls events are running this season?"
  The agent should call find_events with no narrowing arguments and
  surface the event names + conference.
tool_sequence:
  - tool: find_events
expected_contains:
  - "North Atlantic"
  - "2025-26"
expected_judge:
  - "The output lists at least one ECNL event with a conference and a season identifier."
